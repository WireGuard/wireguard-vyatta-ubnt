name: Build kernel module and tools

on:
  push:
    branches:
      - "master"
    tags:
      - "*.*.*-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MODULE_VERSION: "1.0.20220627"
  TOOLS_VERSION: "1.0.20260223"
  PACKAGE_RELEASE: "2"
  FIRMWARE_ER_v1: "v1.10.11"
  FIRMWARE_ER_v2: "v2.0.9"
  FIRMWARE_UGW: "4.4.50"

jobs:
  headers:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/fossoreslp/wireguard-vyatta-ubnt/ubnt-build:${{ matrix.image }}
      env:
        CROSS: ${{ matrix.toolchain }}

    strategy:
      fail-fast: false
      matrix:
        device: [e100, e200, e300, e1000, ugw3, ugw4, ugwxg]
        version: [1, 2]
        toolchain: [mips64-octeon-linux-]
        image: [octeon-kernel]
        exclude:
          - device: ugw3
            version: 2
          - device: ugw4
            version: 2
          - device: ugwxg
            version: 2
        include:
          - device: e50
            version: 1
            toolchain: mipsel-mtk-linux-
            image: mtk-kernel
          - device: e50
            version: 2
            toolchain: mipsel-linux-gnu-
            image: mipsel-kernel

    steps:
      - uses: actions/checkout@v6
      - name: Build headers
        run: |
          mkdir /headers
          curl -o src.tar.bz2 $(jq -r '.["${{ matrix.device }}"]["${{ matrix.version }}"]' ci/ubnt-source.json)
          tar -xf src.tar.bz2 --wildcards 'source/kernel_*' --strip-components 1
          mv kernel_* kernel.tar.gz
          tar -xf kernel.tar.gz --strip-components 1
          if [ ${{ matrix.version }} -ne 1 ]; then make ARCH=mips ubnt_er_${{ matrix.device }}_defconfig; fi;
          make -j$(nproc) ARCH=mips CROSS_COMPILE=$CROSS HOSTCC="gcc -fcommon" prepare modules_prepare
          make -j$(nproc) ARCH=mips CROSS_COMPILE=$CROSS HOSTCC="gcc -fcommon" modules #vmlinux
          cp Module.symvers .config /headers
          make mrproper
          make -j$(nproc) ARCH=mips O=/headers CROSS_COMPILE=$CROSS HOSTCC="gcc -fcommon" prepare modules_prepare scripts
          rm /headers/source /headers/Makefile
          # This is from alpine linux who in turn got it from
          # http://kernel.ubuntu.com/git/ubuntu/ubuntu-zesty.git/tree/debian/rules.d/3-binary-indep.mk
          find . -path './include/*' -prune -o -path './scripts/*' -prune -o -type f \( -name 'Makefile*' -o -name 'Kconfig*' -o -name 'Kbuild*' -o -name '*.sh' -o -name '*.pl' -o -name '*.lds' -o -name 'Platform' \) -print | cpio -pdm "/headers"
          cp -a scripts include "/headers"
          find $(find arch -name include -type d -print) -type f | cpio -pdm "/headers"
          tar -cf headers.tar /headers/
      - name: Store headers
        uses: actions/upload-artifact@v4
        with:
          name: headers-${{ matrix.device }}-${{ matrix.version }}
          path: headers.tar

  module-prepare:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: WireGuard/wireguard-linux-compat
          ref: v${{ env.MODULE_VERSION }}
          path: module
      - name: Verify and prepare module source
        run: |
          gpg --import ci/AB9942E6D4A4CFC3412620A749FC7012A5DE03AE.gpg
          git -C module verify-tag v$MODULE_VERSION
          cd module
          sed -i 's/ --dirty//g' src/Makefile
          patch -p1 < ../siphash_no_fallthrough.patch
      - name: Upload module source
        uses: actions/upload-artifact@v4
        with:
          name: module-src
          path: module

  module:
    needs: [module-prepare, headers]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/fossoreslp/wireguard-vyatta-ubnt/ubnt-build:${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        device: [e100, e200, e300, e1000, ugw3, ugw4, ugwxg]
        version: [1, 2]
        toolchain: [mips64-octeon-linux-]
        image: [octeon-kernel]
        exclude:
          - device: ugw3
            version: 2
          - device: ugw4
            version: 2
          - device: ugwxg
            version: 2
        include:
          - device: e50
            version: 1
            toolchain: mipsel-mtk-linux-
            image: mtk-kernel
          - device: e50
            version: 2
            toolchain: mipsel-mtk-linux-
            image: mtk-kernel

    steps:
      - uses: actions/checkout@v6
      - name: Restore module source
        uses: actions/download-artifact@v4
        with:
          name: module-src
          path: module
      - name: Restore headers
        uses: actions/download-artifact@v4
        with:
          name: headers-${{ matrix.device }}-${{ matrix.version }}
      - name: Build module
        run: |
          tar -xf headers.tar
          cd module/src
          make -j$(nproc) ARCH=mips CROSS_COMPILE=${{ matrix.toolchain }} KERNELDIR=$GITHUB_WORKSPACE/headers module
          ${{ matrix.toolchain }}strip --strip-debug wireguard.ko
      - name: Upload built module
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ matrix.device }}-${{ matrix.version }}
          path: module/src/wireguard.ko

  tools:
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: mips
            target: mips-linux-musl
            image: ghcr.io/fossoreslp/wireguard-vyatta-ubnt/ubnt-build:mips-tools
          - arch: mipsel
            target: mipsel-linux-musl
            image: ghcr.io/fossoreslp/wireguard-vyatta-ubnt/ubnt-build:mipsel-tools
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: WireGuard/wireguard-tools
          ref: v${{ env.TOOLS_VERSION }}
          path: tools
      - name: Verify and build tools
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          gpg --import ci/AB9942E6D4A4CFC3412620A749FC7012A5DE03AE.gpg
          git -C tools verify-tag v$TOOLS_VERSION
          cd tools/src
          CC="$ARCH-linux-musl-gcc" LDLIBS="-static" make -j$(nproc)
          $ARCH-linux-musl-strip --strip-unneeded wg
      - name: Upload built tools
        uses: actions/upload-artifact@v4
        with:
          name: tools-${{ matrix.arch }}
          path: tools/src/wg

  package:
    needs: [module, tools]
    runs-on: ubuntu-24.04
    container:
      image: debian

    strategy:
      fail-fast: false
      matrix:
        device: [e100, e200, e300, e1000, ugw3, ugw4, ugwxg]
        version: [1, 2]
        arch: [mips]
        exclude:
          - device: ugw3
            version: 2
          - device: ugw4
            version: 2
          - device: ugwxg
            version: 2
        include:
          - device: e50
            version: 1
            arch: mipsel
          - device: e50
            version: 2
            arch: mipsel
    steps:
      - uses: actions/checkout@v6
      - name: Download module
        uses: actions/download-artifact@v4
        with:
          name: module-${{ matrix.device }}-${{ matrix.version }}
      - name: Download tools
        uses: actions/download-artifact@v4
        with:
          name: tools-${{ matrix.arch }}
      - name: Build package
        run: |
          apt update
          apt install -y kmod
          export KERNEL=$(modinfo -F vermagic wireguard.ko | cut -d ' ' -f 1)
          mkdir -p pkg/usr/bin pkg/lib/modules/$KERNEL/kernel/net
          cp -r debian pkg/DEBIAN
          cp -r opt pkg/opt
          cp wireguard.ko pkg/lib/modules/$KERNEL/kernel/net/wireguard.ko
          cp wg pkg/usr/bin/wg
          chmod +x pkg/usr/bin/wg
          sed -i "s/PACKAGE_VERSION/$MODULE_VERSION/g" pkg/DEBIAN/control
          sed -i "s/PACKAGE_RELEASE/$PACKAGE_RELEASE/g" pkg/DEBIAN/control
          sed -i "s/KERNEL_VER/$KERNEL/g" pkg/DEBIAN/preinst
          sed -i "s/PACKAGE_ARCH/${{ matrix.arch }}/g" pkg/DEBIAN/control
          dpkg-deb -b -Z gzip pkg
          mv pkg.deb ${{ matrix.device }}-v${{ matrix.version }}-v$MODULE_VERSION-v$TOOLS_VERSION.deb
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: release_${{ matrix.device }}-v${{ matrix.version }}
          path: ${{ matrix.device }}-v${{ matrix.version }}-v${{ env.MODULE_VERSION }}-v${{ env.TOOLS_VERSION }}.deb

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs:
      - package

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          pattern: release_*
          path: artifacts
          merge-multiple: true
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          envsubst < ci/release_body.md > release_notes.md
          gh release create "${{ github.ref_name }}" \
            --title "WireGuard ${MODULE_VERSION} ${TOOLS_VERSION}" \
            -F release_notes.md \
            artifacts/*
